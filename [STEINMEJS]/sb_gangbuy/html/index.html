<!doctype html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forbindelsen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <main id="app" class="app hidden">
        <header>
            <div>
                <span class="eyebrow">UNDERGRUNDEN</span>
                <h1>Forbindelsen</h1>
                <p>Opgaver, adgang og diskrete leveringer.</p>
            </div>
            <button id="close" class="icon-button" aria-label="Luk"><i class="fa-solid fa-xmark"></i></button>
        </header>

        <section class="profile" id="profile"></section>

        <nav>
            <button class="tab active" data-tab="overview"><i class="fa-solid fa-chart-line"></i> Overblik</button>
            <button class="tab" data-tab="missions"><i class="fa-solid fa-list-check"></i> Missioner</button>
            <button class="tab" data-tab="shop"><i class="fa-solid fa-boxes-stacked"></i> Varer</button>
            <button class="tab" data-tab="delivery"><i class="fa-solid fa-truck-fast"></i> Levering</button>
        </nav>

        <section id="content" class="content"></section>
    </main>
    <script src="app.js"></script>
</body>
</html>
