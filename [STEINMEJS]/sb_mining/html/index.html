<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SB Mining</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside id="mission-hud" class="mission-hud hidden">
        <div class="mission-hud-header">
            <span class="mission-hud-eyebrow">AKTIV MISSION</span>
            <h2 id="mission-hud-title"></h2>
        </div>
        <p id="mission-hud-description" class="mission-hud-description"></p>
        <div id="mission-hud-requirements" class="mission-hud-requirements"></div>
    </aside>
    <aside id="xp-hud" class="xp-hud hidden">
        <div class="xp-hud-row">
            <div>
                <span class="xp-hud-eyebrow">MINING XP</span>
                <strong id="xp-hud-level">Level 1</strong>
            </div>
            <span id="xp-hud-value">0 / 180 XP</span>
        </div>
        <div class="xp-progress-track">
            <div id="xp-progress-fill" class="xp-progress-fill"></div>
        </div>
        <small id="xp-hud-remaining">180 XP til næste level</small>
    </aside>
    <main id="app" class="app hidden">
        <header>
            <div>
                <span class="eyebrow">MINEARBEJDE</span>
                <h1>Stenbrud & mineraler</h1>
                <p>Køb udstyr, tag missioner og sælg dine fund.</p>
            </div>
            <button id="close" class="icon-button">×</button>
        </header>
        <nav>
            <button data-tab="shop">Butik</button>
            <button data-tab="missions">Missioner</button>
            <button data-tab="sell">Salg</button>
        </nav>
        <section class="profile" id="profile"></section>
        <section id="content" class="content"></section>
    </main>
    <script src="app.js"></script>
</body>
</html>
