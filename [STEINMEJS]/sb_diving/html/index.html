<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SB Diving</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="app" class="app hidden">
        <header class="topbar">
            <div class="brand">
                <div class="brand-icon">⚓</div>
                <div>
                    <span class="eyebrow">PACIFIC DIVING</span>
                    <h1>Dykkercenter</h1>
                </div>
            </div>
            <button id="close" class="icon-button" aria-label="Luk">×</button>
        </header>

        <nav class="tabs">
            <button data-view="shop">Butik</button>
            <button data-view="missions">Missioner</button>
            <button data-view="sell">Sælg fund</button>
        </nav>

        <section id="content" class="content"></section>
    </main>


    <aside id="mission-hud" class="mission-hud hidden" aria-live="polite">
        <div class="mission-hud-head">
            <div>
                <span class="mission-hud-kicker">AKTIV MISSION</span>
                <strong id="mission-hud-title">Dykkermission</strong>
            </div>
            <div class="mission-hud-count">
                <span id="mission-hud-remaining">0</span>
                <small>tilbage</small>
            </div>
        </div>

        <div class="mission-progress-row">
            <span id="mission-hud-progress-text">0 / 0 kister</span>
            <span id="mission-hud-percent">0%</span>
        </div>
        <div class="mission-progress-track">
            <div id="mission-progress-fill" class="mission-progress-fill"></div>
        </div>

        <div class="mission-guide">
            <span class="mission-guide-title">Lille guide</span>
            <ol id="mission-guide-list"></ol>
        </div>
    </aside>

    <aside id="oxygen-hud" class="oxygen-hud hidden" aria-live="polite">
        <div class="oxygen-head">
            <span>ILT</span>
            <strong id="oxygen-time">15:00</strong>
        </div>
        <div class="oxygen-track">
            <div id="oxygen-fill" class="oxygen-fill"></div>
        </div>
        <small id="oxygen-state">Klar</small>
    </aside>

    <script src="app.js"></script>
</body>
</html>
