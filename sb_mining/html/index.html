<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SB Mining</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="app" class="app hidden">
        <header>
            <div>
                <span class="eyebrow">MINEARBEJDE</span>
                <h1>Stenbrud & mineraler</h1>
                <p>Køb udstyr, tag missioner og sælg dine fund.</p>
            </div>
            <button id="close" class="icon-button">×</button>
        </header>
        <nav>
            <button data-tab="shop">Butik</button>
            <button data-tab="missions">Missioner</button>
            <button data-tab="sell">Salg</button>
        </nav>
        <section class="profile" id="profile"></section>
        <section id="content" class="content"></section>
    </main>
    <script src="app.js"></script>
</body>
</html>
